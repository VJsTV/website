<a href="{{ include.artist.url }}" class="text-decoration-none vjs-nts-card"
   data-style="{{ include.artist.visual_style | downcase }}"
   data-tech="{{ include.artist.technologies | join: ',' | downcase }}"
   data-location="{{ include.artist.location | downcase }}">
  <div class="vjs-nts-visual">
    <div class="vjs-nts-visual-inner" style="background: linear-gradient(135deg, rgba(157,0,255,0.45) 0%, rgba(0,212,255,0.2) 60%, rgba(255,0,170,0.15) 100%); position:relative; width:100%; height:100%;">
      <div style="position:absolute; inset:0; background: radial-gradient(ellipse 80% 80% at 30% 40%, rgba(157,0,255,0.3) 0%, transparent 60%), radial-gradient(ellipse 60% 60% at 75% 65%, rgba(0,212,255,0.2) 0%, transparent 55%);"></div>
      <div style="position:absolute; inset:0; background: repeating-linear-gradient(90deg, transparent, transparent 6px, rgba(157,0,255,0.04) 6px, rgba(157,0,255,0.04) 7px);"></div>
      <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">
        <span style="font-family:'Orbitron',sans-serif; font-size:5rem; font-weight:900; color:rgba(255,255,255,0.06); letter-spacing:-0.05em; user-select:none;">{{ include.artist.title | slice: 0, 1 | upcase }}</span>
      </div>
    </div>
  </div>
  <div class="vjs-nts-info">
    <div class="vjs-nts-location">{{ include.artist.location }}</div>
    <div class="vjs-nts-name">{{ include.artist.title }}</div>
    <div class="vjs-nts-style">{{ include.artist.visual_style | truncate: 50 }}</div>
    {% if include.artist.technologies %}
    <div style="margin-top:0.5rem; display:flex; flex-wrap:wrap; gap:0.3rem;">
      {% for tech in include.artist.technologies limit:3 %}
      <span class="vjs-tag vjs-tag-purple" style="font-size:0.6rem; padding:2px 8px;">{{ tech }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>
</a>
