<script>
/* ── VJS GLOBAL VIMEO THUMBNAIL LOADER ──────────────────────────
   Any element with class="vjs-vimeo-thumb" and data-vimeo="ID"
   will automatically receive its Vimeo thumbnail as background.
   Add those two attributes to any card/div to get auto-images.
──────────────────────────────────────────────────────────────── */
(function() {
  function vjsLoadVimeoThumbs() {
    document.querySelectorAll('.vjs-vimeo-thumb[data-vimeo]').forEach(function(el) {
      var id = el.getAttribute('data-vimeo');
      if (!id || el.dataset.vjsThumbLoaded) return;
      el.dataset.vjsThumbLoaded = '1';
      fetch('https://vimeo.com/api/oembed.json?url=https://vimeo.com/' + id + '&width=480')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.thumbnail_url) {
            el.style.backgroundImage    = 'url(' + data.thumbnail_url + ')';
            el.style.backgroundSize     = 'cover';
            el.style.backgroundPosition = 'center';
            el.classList.add('loaded');
          }
        }).catch(function() { el.removeAttribute('data-vjs-thumb-loaded'); });
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', vjsLoadVimeoThumbs);
  } else {
    vjsLoadVimeoThumbs();
  }
  window.vjsLoadVimeoThumbs = vjsLoadVimeoThumbs;
})();
</script>
